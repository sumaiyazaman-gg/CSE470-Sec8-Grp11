<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            background: #88d8da;
            margin: 0;
            font-family: Arial;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            margin: 15px 0;
            text-decoration: none;
        }

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .card {
            display: inline-block;
            width: 200px;
            height: 100px;
            background: #3498db;
            color: white;
            margin: 10px;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3>Menu</h3>
    <a href="#">Dashboard</a>
    <a href="#">Requests</a>
    <a href="#">Booking</a>
    <a href="#">Announcements</a>
</div>

<div class="main">
    <h2>  Services </h2>

    <div class="card">Service Requests</div>
    <div class="card">Bookings</div>
    <div class="card">Events</div>
    <div class="card">Feedback</div>
</div>

</body>
</html>
